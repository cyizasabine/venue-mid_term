<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venue Management System - Login</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #767879, #80deea, #767879);
      margin: 0;
    }
    .login-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.15);
      width: 350px;
      text-align: center;
    }
    .login-container h2 {
      margin-bottom: 20px;
      font-size: 26px;
      color: #333;
      font-weight: 700;
    }
    .login-container input[type="email"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-top: 10px; /* Adjusted margin for spacing */
    }
    .login-container label {
      font-size: 14px;
      color: #505850;
      margin-left: 8px; /* Space between checkbox and label */
    }
    .login-container button {
      width: 100%;
      padding: 12px;
      background-color: #505850;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-top: 15px; /* Space above the button */
    }
    .login-container button:hover {
      background-color: #333;
    }
    .message {
      margin-top: 15px;
      font-size: 14px;
    }
    .signup-link, .forgot-password-link {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      color: #505850;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .signup-link:hover, .forgot-password-link:hover {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Venue Management Login</h2>
    <form id="login-form">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <div class="remember-me">
       
      </div>
      <button type="button" onclick="submitLogin()">Login</button>
      <input type="checkbox" id="rememberMe" name="rememberMe">
      <label for="rememberMe">Remember Me</label>
    </form>
    <div id="message" class="message"></div>
    <a href="./Forgot.html" class="forgot-password-link">Forgot Password?</a>
    <a href="./sign up.html" class="signup-link">Don't have an account? Sign up here</a>
  </div>

  <script>
    async function submitLogin() {
      const form = document.getElementById('login-form');
      const formData = {
        email: form.email.value,
        password: form.password.value,
        rememberMe: form.rememberMe.checked
      };

      try {
        const response = await fetch('http://localhost:8081/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const messageDiv = document.getElementById('message');
        if (response.ok) {
          messageDiv.style.color = 'green';
          messageDiv.textContent = 'Login successful!';
          
          const data = await response.json(); // Assuming token is returned
          if (formData.rememberMe) {
            localStorage.setItem('authToken', data.token);
          } else {
            sessionStorage.setItem('authToken', data.token);
          }

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } else {
          const errorData = await response.json();
          messageDiv.style.color = 'red';
          messageDiv.textContent = errorData.message || 'Login failed!';
        }
      } catch (error) {
        document.getElementById('message').textContent = 'Error: Unable to connect to the server.';
      }
    }
  </script>
</body>
</html>
